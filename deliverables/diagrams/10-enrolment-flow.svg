<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdr3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3AA0"/>
      <stop offset="1" stop-color="#E63946"/>
    </linearGradient>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E3AA0"/>
    </marker>
  </defs>
  <rect width="1000" height="540" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1000" height="56" fill="url(#hdr3)"/>
  <text x="500" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">Automated Student Enrolment — Two Modes</text>

  <!-- Mode A: single-student -->
  <g>
    <rect x="40" y="100" width="200" height="380" rx="14" fill="#FFFFFF" stroke="#1E3AA0" stroke-width="2"/>
    <text x="140" y="130" fill="#1E3AA0" font-size="15" font-weight="700" text-anchor="middle">Mode A — Single</text>
    <text x="140" y="150" fill="#64748B" font-size="11" text-anchor="middle">/staff/enrollment</text>
    <line x1="60" y1="170" x2="220" y2="170" stroke="#E2E8F0"/>

    <text x="140" y="195" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">1. Form filled</text>
    <text x="60"  y="218" fill="#475569" font-size="11">• Full name + DOB</text>
    <text x="60"  y="238" fill="#475569" font-size="11">• Sex · Phone</text>
    <text x="60"  y="258" fill="#475569" font-size="11">• Specialty + level</text>
    <text x="60"  y="278" fill="#475569" font-size="11">• Guardian</text>

    <text x="140" y="320" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">2. On submit</text>
    <text x="60"  y="343" fill="#1E3AA0" font-size="11" font-weight="700">→ Auto-generate</text>
    <text x="60"  y="363" fill="#475569" font-size="11">Matricule, email,</text>
    <text x="60"  y="383" fill="#475569" font-size="11">account, ID card,</text>
    <text x="60"  y="403" fill="#475569" font-size="11">tuition record.</text>

    <text x="140" y="435" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">3. Confirmation</text>
    <text x="140" y="458" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">Toast + table row</text>
  </g>

  <!-- Mode B: bulk -->
  <g>
    <rect x="280" y="100" width="200" height="380" rx="14" fill="#FFFFFF" stroke="#E63946" stroke-width="2"/>
    <text x="380" y="130" fill="#E63946" font-size="15" font-weight="700" text-anchor="middle">Mode B — Bulk CSV</text>
    <text x="380" y="150" fill="#64748B" font-size="11" text-anchor="middle">N records at once</text>
    <line x1="300" y1="170" x2="460" y2="170" stroke="#E2E8F0"/>

    <text x="380" y="195" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">1. Template</text>
    <text x="380" y="216" fill="#475569" font-size="11" text-anchor="middle">Download CSV</text>
    <text x="380" y="232" fill="#475569" font-size="11" text-anchor="middle">with column hints</text>

    <text x="380" y="265" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">2. Upload</text>
    <text x="380" y="286" fill="#475569" font-size="11" text-anchor="middle">Parse + validate</text>
    <text x="380" y="302" fill="#475569" font-size="11" text-anchor="middle">missing columns</text>

    <text x="380" y="335" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">3. Stream-enroll</text>
    <text x="380" y="356" fill="#475569" font-size="11" text-anchor="middle">Per-row pipeline</text>
    <text x="380" y="372" fill="#475569" font-size="11" text-anchor="middle">Live progress bar</text>

    <text x="380" y="405" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">4. Export</text>
    <text x="380" y="426" fill="#475569" font-size="11" text-anchor="middle">CSV with</text>
    <text x="380" y="442" fill="#475569" font-size="11" text-anchor="middle">credentials &amp; matricules</text>
    <text x="380" y="465" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">Distributed to parents</text>
  </g>

  <!-- Common pipeline (auto-create) -->
  <g>
    <rect x="540" y="100" width="420" height="380" rx="14" fill="#F1F5F9" stroke="#1E3AA0" stroke-width="2"/>
    <text x="750" y="130" fill="#1E3AA0" font-size="15" font-weight="700" text-anchor="middle">Auto-creation pipeline (shared by both modes)</text>
    <line x1="560" y1="150" x2="940" y2="150" stroke="#E2E8F0"/>

    <g>
      <rect x="560" y="170" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#1E3AA0"/>
      <text x="650" y="195" fill="#1E3AA0" font-size="12" font-weight="700" text-anchor="middle">Matricule</text>
      <text x="650" y="215" fill="#475569" font-size="11" font-family="monospace" text-anchor="middle">IUGET/YYYY/SPEC/####</text>
    </g>
    <g>
      <rect x="760" y="170" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#1E3AA0"/>
      <text x="850" y="195" fill="#1E3AA0" font-size="12" font-weight="700" text-anchor="middle">University email</text>
      <text x="850" y="215" fill="#475569" font-size="11" font-family="monospace" text-anchor="middle">last.####@iuget.cm</text>
    </g>
    <g>
      <rect x="560" y="245" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#1E3AA0"/>
      <text x="650" y="270" fill="#1E3AA0" font-size="12" font-weight="700" text-anchor="middle">Login account</text>
      <text x="650" y="290" fill="#475569" font-size="11" text-anchor="middle">Initial password set</text>
    </g>
    <g>
      <rect x="760" y="245" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#1E3AA0"/>
      <text x="850" y="270" fill="#1E3AA0" font-size="12" font-weight="700" text-anchor="middle">ID Card record</text>
      <text x="850" y="290" fill="#475569" font-size="11" text-anchor="middle">Valid 1 year</text>
    </g>
    <g>
      <rect x="560" y="320" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#1E3AA0"/>
      <text x="650" y="345" fill="#1E3AA0" font-size="12" font-weight="700" text-anchor="middle">Tuition account</text>
      <text x="650" y="365" fill="#475569" font-size="11" text-anchor="middle">500,000 FCFA balance</text>
    </g>
    <g>
      <rect x="760" y="320" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#1E3AA0"/>
      <text x="850" y="345" fill="#1E3AA0" font-size="12" font-weight="700" text-anchor="middle">Timetable mapping</text>
      <text x="850" y="365" fill="#475569" font-size="11" text-anchor="middle">By specialty + level</text>
    </g>

    <g>
      <rect x="660" y="405" width="180" height="60" rx="8" fill="#10B981"/>
      <text x="750" y="430" fill="white" font-size="13" font-weight="700" text-anchor="middle">✓ Student active</text>
      <text x="750" y="450" fill="#D1FAE5" font-size="11" text-anchor="middle">Visible everywhere</text>
    </g>
  </g>

  <!-- Connectors -->
  <line x1="240" y1="290" x2="540" y2="290" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="480" y1="290" x2="540" y2="290" stroke="#E63946" stroke-width="1.5" marker-end="url(#arr3)"/>

  <text x="500" y="515" fill="#64748B" font-size="12" text-anchor="middle">Both modes converge on the same six-record pipeline · all visible immediately in dashboards.</text>
</svg>
