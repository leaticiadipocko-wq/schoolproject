<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3AA0"/>
      <stop offset="1" stop-color="#3B6DF5"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E3AA0"/>
    </marker>
  </defs>
  <rect width="1000" height="620" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1000" height="56" fill="url(#hdr)"/>
  <text x="500" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">Parent Registration Flow — IUGET Bonabéri</text>

  <!-- Parent -->
  <g>
    <circle cx="80" cy="320" r="40" fill="#E63946"/>
    <text x="80" y="326" fill="white" font-size="14" font-weight="700" text-anchor="middle">Parent</text>
    <text x="80" y="376" fill="#475569" font-size="12" text-anchor="middle">(no account)</text>
  </g>

  <!-- Step 1 -->
  <g>
    <rect x="170" y="120" width="160" height="80" rx="10" fill="#FFFFFF" stroke="#1E3AA0" stroke-width="2"/>
    <text x="250" y="148" fill="#1E3AA0" font-size="13" font-weight="700" text-anchor="middle">1. Browse</text>
    <text x="250" y="170" fill="#1E293B" font-size="11" text-anchor="middle">/parent portal</text>
    <text x="250" y="186" fill="#64748B" font-size="11" text-anchor="middle">Specialties · Fees</text>
  </g>

  <!-- Step 2 -->
  <g>
    <rect x="170" y="220" width="160" height="80" rx="10" fill="#FFFFFF" stroke="#1E3AA0" stroke-width="2"/>
    <text x="250" y="248" fill="#1E3AA0" font-size="13" font-weight="700" text-anchor="middle">2. Parent details</text>
    <text x="250" y="270" fill="#64748B" font-size="11" text-anchor="middle">Name · Phone</text>
    <text x="250" y="286" fill="#64748B" font-size="11" text-anchor="middle">Email · Address</text>
  </g>

  <!-- Step 3 -->
  <g>
    <rect x="170" y="320" width="160" height="80" rx="10" fill="#FFFFFF" stroke="#1E3AA0" stroke-width="2"/>
    <text x="250" y="348" fill="#1E3AA0" font-size="13" font-weight="700" text-anchor="middle">3. Child details</text>
    <text x="250" y="370" fill="#64748B" font-size="11" text-anchor="middle">DOB · Sex · Avg</text>
    <text x="250" y="386" fill="#64748B" font-size="11" text-anchor="middle">Previous school</text>
  </g>

  <!-- Step 4 -->
  <g>
    <rect x="170" y="420" width="160" height="80" rx="10" fill="#FFFFFF" stroke="#1E3AA0" stroke-width="2"/>
    <text x="250" y="448" fill="#1E3AA0" font-size="13" font-weight="700" text-anchor="middle">4. Specialty</text>
    <text x="250" y="470" fill="#64748B" font-size="11" text-anchor="middle">SWE · CNSM · BST</text>
    <text x="250" y="486" fill="#64748B" font-size="11" text-anchor="middle">Level 1 / 2 / 3</text>
  </g>

  <!-- Step 5 (Payment) -->
  <g>
    <rect x="380" y="320" width="180" height="80" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="470" y="348" fill="#92400E" font-size="13" font-weight="700" text-anchor="middle">5. Choose payment</text>
    <text x="470" y="370" fill="#92400E" font-size="11" text-anchor="middle">MoMo · OM · PayPal</text>
    <text x="470" y="386" fill="#92400E" font-size="11" text-anchor="middle">Visa · Bank</text>
  </g>

  <!-- USSD popup -->
  <g>
    <rect x="610" y="220" width="180" height="80" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
    <text x="700" y="245" fill="#FBBF24" font-size="11" font-family="monospace" text-anchor="middle">› Dialled *126#</text>
    <text x="700" y="262" fill="#86EFAC" font-size="11" font-family="monospace" text-anchor="middle">› 2. Pay merchant</text>
    <text x="700" y="279" fill="#86EFAC" font-size="11" font-family="monospace" text-anchor="middle">→ Phone + PIN</text>
    <text x="700" y="295" fill="#9CA3AF" font-size="10" font-family="monospace" text-anchor="middle">Privacy: PIN not stored</text>
  </g>

  <!-- Processing -->
  <g>
    <rect x="610" y="320" width="180" height="80" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="700" y="348" fill="#475569" font-size="13" font-weight="700" text-anchor="middle">Processing…</text>
    <text x="700" y="370" fill="#64748B" font-size="11" text-anchor="middle">Encrypt → Authenticate</text>
    <text x="700" y="386" fill="#64748B" font-size="11" text-anchor="middle">→ Authorise (2.2 s)</text>
  </g>

  <!-- Success -->
  <g>
    <rect x="610" y="420" width="180" height="80" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <text x="700" y="448" fill="#065F46" font-size="13" font-weight="700" text-anchor="middle">✓ SUCCESSFUL</text>
    <text x="700" y="470" fill="#065F46" font-size="11" text-anchor="middle">Ref · MOMO-XXXXX</text>
    <text x="700" y="486" fill="#065F46" font-size="11" text-anchor="middle">Amount confirmed</text>
  </g>

  <!-- Final -->
  <g>
    <rect x="830" y="320" width="150" height="180" rx="10" fill="#1E3AA0" stroke="#172250" stroke-width="2"/>
    <text x="905" y="350" fill="white" font-size="13" font-weight="700" text-anchor="middle">Confirmation</text>
    <text x="905" y="372" fill="white" font-size="11" text-anchor="middle">Matricule</text>
    <text x="905" y="388" fill="#BFD4FE" font-size="10" font-family="monospace" text-anchor="middle">IUGET/2026/SWE/0237</text>
    <text x="905" y="408" fill="white" font-size="11" text-anchor="middle">Email · Password</text>
    <text x="905" y="424" fill="white" font-size="11" text-anchor="middle">ID card · Fees set</text>
    <text x="905" y="450" fill="#FBBF24" font-size="11" font-weight="700" text-anchor="middle">Printable receipt</text>
    <text x="905" y="468" fill="white" font-size="10" text-anchor="middle">QR · Signatures</text>
  </g>

  <!-- Arrows from parent through steps -->
  <line x1="125" y1="280" x2="170" y2="200" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="200" x2="250" y2="220" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="300" x2="250" y2="320" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="400" x2="250" y2="420" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="330" y1="360" x2="380" y2="360" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="350" x2="610" y2="290" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="300" x2="700" y2="320" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="400" x2="700" y2="420" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="790" y1="460" x2="830" y2="430" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Caption -->
  <text x="500" y="600" fill="#64748B" font-size="12" text-anchor="middle">Five-step wizard with simulated provider USSD/3-DS payment and auto-generated student account.</text>
</svg>
