<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdr2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#1E3AA0"/>
    </linearGradient>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E3AA0"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1000" height="56" fill="url(#hdr2)"/>
  <text x="500" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">Tuition Payment Simulation — Five Channels</text>

  <!-- Top: 5 method cards -->
  <g>
    <rect x="40"  y="100" width="170" height="80" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="125" y="128" fill="#92400E" font-size="13" font-weight="700" text-anchor="middle">MTN MoMo</text>
    <text x="125" y="150" fill="#92400E" font-size="11" font-family="monospace" text-anchor="middle">*126#</text>
    <text x="125" y="168" fill="#92400E" font-size="10" text-anchor="middle">Phone + PIN</text>
  </g>
  <g>
    <rect x="230" y="100" width="170" height="80" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
    <text x="315" y="128" fill="#9A3412" font-size="13" font-weight="700" text-anchor="middle">Orange Money</text>
    <text x="315" y="150" fill="#9A3412" font-size="11" font-family="monospace" text-anchor="middle">#150*4#</text>
    <text x="315" y="168" fill="#9A3412" font-size="10" text-anchor="middle">Phone + PIN</text>
  </g>
  <g>
    <rect x="420" y="100" width="170" height="80" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="505" y="128" fill="#1E40AF" font-size="13" font-weight="700" text-anchor="middle">PayPal</text>
    <text x="505" y="150" fill="#1E40AF" font-size="11" text-anchor="middle">Email login</text>
    <text x="505" y="168" fill="#1E40AF" font-size="10" text-anchor="middle">USD conversion</text>
  </g>
  <g>
    <rect x="610" y="100" width="170" height="80" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>
    <text x="695" y="128" fill="#1E293B" font-size="13" font-weight="700" text-anchor="middle">Visa / MC</text>
    <text x="695" y="150" fill="#1E293B" font-size="11" text-anchor="middle">3-D Secure</text>
    <text x="695" y="168" fill="#1E293B" font-size="10" text-anchor="middle">Card + OTP</text>
  </g>
  <g>
    <rect x="800" y="100" width="170" height="80" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <text x="885" y="128" fill="#065F46" font-size="13" font-weight="700" text-anchor="middle">Bank Transfer</text>
    <text x="885" y="150" fill="#065F46" font-size="11" text-anchor="middle">Afriland · UBA</text>
    <text x="885" y="168" fill="#065F46" font-size="10" text-anchor="middle">IBAN copy</text>
  </g>

  <!-- Privacy guarantee -->
  <g>
    <rect x="180" y="220" width="640" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="500" y="248" fill="#065F46" font-size="14" font-weight="700" text-anchor="middle">🛡  Privacy Guarantee</text>
    <text x="500" y="268" fill="#065F46" font-size="11" text-anchor="middle">SIARM never stores PIN, password or card. Forwarded to provider and erased from memory.</text>
  </g>

  <!-- Common steps -->
  <g>
    <rect x="80" y="320" width="180" height="80" rx="10" fill="#1E3AA0"/>
    <text x="170" y="350" fill="white" font-size="14" font-weight="700" text-anchor="middle">1. Credentials</text>
    <text x="170" y="372" fill="#BFD4FE" font-size="11" text-anchor="middle">Method-specific</text>
    <text x="170" y="388" fill="#BFD4FE" font-size="11" text-anchor="middle">user input</text>
  </g>
  <g>
    <rect x="290" y="320" width="180" height="80" rx="10" fill="#1E3AA0"/>
    <text x="380" y="350" fill="white" font-size="14" font-weight="700" text-anchor="middle">2. Processing</text>
    <text x="380" y="372" fill="#BFD4FE" font-size="11" text-anchor="middle">2.2 s simulated</text>
    <text x="380" y="388" fill="#BFD4FE" font-size="11" text-anchor="middle">network call</text>
  </g>
  <g>
    <rect x="500" y="320" width="180" height="80" rx="10" fill="#10B981"/>
    <text x="590" y="350" fill="white" font-size="14" font-weight="700" text-anchor="middle">3. Success</text>
    <text x="590" y="372" fill="#D1FAE5" font-size="11" text-anchor="middle">Reference code</text>
    <text x="590" y="388" fill="#D1FAE5" font-size="11" text-anchor="middle">Amount cleared</text>
  </g>
  <g>
    <rect x="710" y="320" width="180" height="80" rx="10" fill="#E63946"/>
    <text x="800" y="350" fill="white" font-size="14" font-weight="700" text-anchor="middle">4. Receipt</text>
    <text x="800" y="372" fill="#FECACA" font-size="11" text-anchor="middle">PDF + Print</text>
    <text x="800" y="388" fill="#FECACA" font-size="11" text-anchor="middle">QR verification</text>
  </g>
  <line x1="260" y1="360" x2="290" y2="360" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="470" y1="360" x2="500" y2="360" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="680" y1="360" x2="710" y2="360" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Bursary reception -->
  <g>
    <rect x="280" y="440" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#1E3AA0" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="500" y="468" fill="#1E3AA0" font-size="13" font-weight="700" text-anchor="middle">5. Recorded in /staff/finance dashboard</text>
    <text x="500" y="488" fill="#475569" font-size="11" text-anchor="middle">KPI updated · monthly trend redrawn · pie distribution updated</text>
    <text x="500" y="504" fill="#64748B" font-size="10" text-anchor="middle">Bursary may issue stamped duplicate receipt on request</text>
  </g>
  <line x1="800" y1="400" x2="600" y2="440" stroke="#E63946" stroke-width="1.5" marker-end="url(#arr2)"/>

  <text x="500" y="555" fill="#64748B" font-size="12" text-anchor="middle">All five methods share the same 4-step pipeline; only the credentials pane varies.</text>
</svg>
