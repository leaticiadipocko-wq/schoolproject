<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="1100" height="600">

<style>
  .bg { fill: #ffffff; }
  text { font-family: 'Inter', system-ui, sans-serif; }
  .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
  .subtitle { font-size: 12px; fill: #64748b; }
  .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; ry: 10; }
  .box-brand { fill: #eff4ff; stroke: #1e3aa0; stroke-width: 2; rx: 10; ry: 10; }
  .box-accent { fill: #fef2f2; stroke: #e63946; stroke-width: 2; rx: 10; ry: 10; }
  .box-ink { fill: #1e3aa0; stroke: #172250; rx: 10; ry: 10; }
  .label { font-size: 13px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
  .label-white { font-size: 13px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
  .label-sm { font-size: 11px; fill: #64748b; text-anchor: middle; }
  .label-sm-white { font-size: 11px; fill: #c7d2fe; text-anchor: middle; }
  .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .arrow-brand { stroke: #1e3aa0; stroke-width: 2; fill: none; marker-end: url(#arrow-brand); }
  .arrow-red { stroke: #e63946; stroke-width: 1.8; fill: none; marker-end: url(#arrow-red); stroke-dasharray: 5,3; }
  .group-label { font-size: 11px; font-weight: 700; fill: #1e3aa0; text-anchor: start; letter-spacing: 1px; }
  .group-box { fill: rgba(30,58,160,0.04); stroke: #1e3aa0; stroke-width: 1; stroke-dasharray: 4,3; rx: 14; ry: 14; }
  .er-attr { font-size: 11px; fill: #334155; }
  .er-key { font-size: 11px; font-weight: 700; fill: #1e3aa0; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
  <marker id="arrow-brand" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1e3aa0"/></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#e63946"/></marker>
</defs>

<rect class="bg" width="1100" height="600"/>
<text x="40" y="38" class="title">SIARM — Deployment Diagram</text>
<text x="40" y="58" class="subtitle">Three deployment nodes: client browser, static CDN, and managed BaaS</text>

    <rect x="40" y="110" width="280" height="320" fill="none" stroke="#1e3aa0" stroke-width="2" rx="10"/>
    <rect x="48" y="118" width="264" height="22" fill="#1e3aa0" rx="4"/>
    <text x="180" y="134" class="label-white" font-size="11">« device »   User Browser</text>
    <text x="180" y="418" class="label-sm">Chrome / Firefox / Mobile</text>
    <rect x="60" y="160" width="240" height="60" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="180" y="186" class="label" font-size="11">React 18 SPA</text>
    <text x="180" y="202" class="label-sm">Tailwind UI</text>
    <rect x="60" y="240" width="240" height="60" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="180" y="266" class="label" font-size="11">Service Worker</text>
    <text x="180" y="282" class="label-sm">Offline caching</text>
    <rect x="60" y="320" width="240" height="60" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="180" y="346" class="label" font-size="11">localStorage</text>
    <text x="180" y="362" class="label-sm">Demo data + theme</text>
    <rect x="390" y="110" width="320" height="320" fill="none" stroke="#1e3aa0" stroke-width="2" rx="10"/>
    <rect x="398" y="118" width="304" height="22" fill="#1e3aa0" rx="4"/>
    <text x="550" y="134" class="label-white" font-size="11">« cloud »   Vercel / Netlify CDN</text>
    <text x="550" y="418" class="label-sm">Edge-deployed static assets</text>
    <rect x="410" y="160" width="280" height="60" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="550" y="186" class="label" font-size="11">Static SIARM Bundle</text>
    <text x="550" y="202" class="label-sm">HTML + CSS + JS (~1.6 MB)</text>
    <rect x="410" y="240" width="280" height="60" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="550" y="266" class="label" font-size="11">Public Assets</text>
    <text x="550" y="282" class="label-sm">IUGET logo, fonts, icons</text>
    <rect x="770" y="110" width="290" height="320" fill="none" stroke="#e63946" stroke-width="2" rx="10"/>
    <rect x="778" y="118" width="274" height="22" fill="#e63946" rx="4"/>
    <text x="915" y="134" class="label-white" font-size="11">« cloud »   Firebase + Anthropic</text>
    <text x="915" y="418" class="label-sm">Backend-as-a-service</text>
    <rect x="790" y="160" width="250" height="50" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="915" y="181" class="label" font-size="11">Firebase Auth</text>
    <text x="915" y="197" class="label-sm">JWT + email/password</text>
    <rect x="790" y="230" width="250" height="50" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="915" y="251" class="label" font-size="11">Cloud Firestore</text>
    <text x="915" y="267" class="label-sm">Multi-region NoSQL DB</text>
    <rect x="790" y="300" width="250" height="50" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="915" y="321" class="label" font-size="11">Firebase Storage</text>
    <text x="915" y="337" class="label-sm">PDF + media blobs</text>
    <rect x="790" y="370" width="250" height="40" fill="#eff4ff" stroke="#1e3aa0" rx="6"/>
    <text x="915" y="386" class="label" font-size="11">Claude AI API</text>
    <text x="915" y="402" class="label-sm">sk-ant-*</text>
    <path d="M320,270 L390,270" stroke="#1e3aa0" stroke-width="1.8" fill="none"/>
    <text x="355" y="264" font-size="10" fill="#1e3aa0" text-anchor="middle" font-weight="600">HTTPS</text>
    <path d="M710,200 L770,200" stroke="#1e3aa0" stroke-width="1.8" fill="none"/>
    <text x="740" y="194" font-size="10" fill="#1e3aa0" text-anchor="middle" font-weight="600">WSS / REST</text>
    <path d="M710,280 L770,280" stroke="#1e3aa0" stroke-width="1.8" fill="none"/>
    <text x="740" y="274" font-size="10" fill="#1e3aa0" text-anchor="middle" font-weight="600">HTTPS / SDK</text>
</svg>