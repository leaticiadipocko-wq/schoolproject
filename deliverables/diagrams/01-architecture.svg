<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720">

<style>
  .bg { fill: #ffffff; }
  text { font-family: 'Inter', system-ui, sans-serif; }
  .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
  .subtitle { font-size: 12px; fill: #64748b; }
  .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; ry: 10; }
  .box-brand { fill: #eff4ff; stroke: #1e3aa0; stroke-width: 2; rx: 10; ry: 10; }
  .box-accent { fill: #fef2f2; stroke: #e63946; stroke-width: 2; rx: 10; ry: 10; }
  .box-ink { fill: #1e3aa0; stroke: #172250; rx: 10; ry: 10; }
  .label { font-size: 13px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
  .label-white { font-size: 13px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
  .label-sm { font-size: 11px; fill: #64748b; text-anchor: middle; }
  .label-sm-white { font-size: 11px; fill: #c7d2fe; text-anchor: middle; }
  .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .arrow-brand { stroke: #1e3aa0; stroke-width: 2; fill: none; marker-end: url(#arrow-brand); }
  .arrow-red { stroke: #e63946; stroke-width: 1.8; fill: none; marker-end: url(#arrow-red); stroke-dasharray: 5,3; }
  .group-label { font-size: 11px; font-weight: 700; fill: #1e3aa0; text-anchor: start; letter-spacing: 1px; }
  .group-box { fill: rgba(30,58,160,0.04); stroke: #1e3aa0; stroke-width: 1; stroke-dasharray: 4,3; rx: 14; ry: 14; }
  .er-attr { font-size: 11px; fill: #334155; }
  .er-key { font-size: 11px; font-weight: 700; fill: #1e3aa0; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
  <marker id="arrow-brand" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1e3aa0"/></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#e63946"/></marker>
</defs>

<rect class="bg" width="1100" height="720"/>
<text x="40" y="38" class="title">SIARM — 3-Tier System Architecture</text>
<text x="40" y="58" class="subtitle">React + Firebase + Anthropic stack with role-based access control</text>
<rect x="60" y="100" width="980" height="160" class="group-box"/>
  <text x="80" y="125" class="group-label">PRESENTATION LAYER · CLIENT</text><rect x="100" y="140" width="200" height="90" class="box-brand"/>
    <text x="200" y="179" class="label">React 18 SPA</text>
    <text x="200" y="197" class="label-sm">Components + Hooks</text><rect x="330" y="140" width="200" height="90" class="box-brand"/>
    <text x="430" y="179" class="label">React Router v6</text>
    <text x="430" y="197" class="label-sm">Role-guarded routes</text><rect x="560" y="140" width="200" height="90" class="box-brand"/>
    <text x="660" y="179" class="label">Tailwind CSS</text>
    <text x="660" y="197" class="label-sm">IUGET Design System</text><rect x="790" y="140" width="220" height="90" class="box-brand"/>
    <text x="900" y="179" class="label">Recharts + jsPDF</text>
    <text x="900" y="197" class="label-sm">Charts + PDF generation</text><rect x="60" y="290" width="980" height="160" class="group-box"/>
  <text x="80" y="315" class="group-label">APPLICATION LOGIC LAYER · CONTEXT</text><rect x="100" y="330" width="220" height="90" class="box-brand"/>
    <text x="210" y="369" class="label">AuthContext</text>
    <text x="210" y="387" class="label-sm">Authentication state</text><rect x="350" y="330" width="220" height="90" class="box-brand"/>
    <text x="460" y="369" class="label">DataContext</text>
    <text x="460" y="387" class="label-sm">CRUD + persistence</text><rect x="600" y="330" width="200" height="90" class="box-brand"/>
    <text x="700" y="369" class="label">Role-Based Guard</text>
    <text x="700" y="387" class="label-sm">ProtectedRoute</text><rect x="830" y="330" width="180" height="90" class="box-brand"/>
    <text x="920" y="369" class="label">AI Chatbot Logic</text>
    <text x="920" y="387" class="label-sm">Rules + Claude API</text><rect x="60" y="480" width="980" height="170" class="group-box"/>
  <text x="80" y="505" class="group-label">DATA AND SERVICES LAYER · BACKEND</text><rect x="100" y="520" width="200" height="100" class="box-ink"/>
    <text x="200" y="564" class="label-white">Firebase Auth</text>
    <text x="200" y="582" class="label-sm-white">Email/password JWT</text><rect x="330" y="520" width="200" height="100" class="box-ink"/>
    <text x="430" y="564" class="label-white">Cloud Firestore</text>
    <text x="430" y="582" class="label-sm-white">NoSQL document DB</text><rect x="560" y="520" width="200" height="100" class="box-ink"/>
    <text x="660" y="564" class="label-white">Firebase Storage</text>
    <text x="660" y="582" class="label-sm-white">PDF &amp; file blobs</text><rect x="790" y="520" width="220" height="100" class="box-accent"/>
    <text x="900" y="564" class="label">Anthropic Claude API</text>
    <text x="900" y="582" class="label-sm">AI enquiry assistant</text><path class="arrow" d="M200,230 L200,330"/><path class="arrow" d="M430,230 L430,330"/><path class="arrow" d="M660,230 L660,330"/><path class="arrow" d="M900,230 L900,330"/><path class="arrow" d="M200,420 L200,520"/><path class="arrow-brand" d="M460,420 L460,520"/><path class="arrow" d="M700,420 L700,520"/><path class="arrow-red" d="M900,420 L900,520"/>
</svg>