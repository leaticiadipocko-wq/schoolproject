<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdrC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3AA0"/>
      <stop offset="1" stop-color="#3B6DF5"/>
    </linearGradient>
    <marker id="inh" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="12" markerHeight="12" orient="auto">
      <polygon points="0,0 13,7 0,14" fill="white" stroke="#1E3AA0" stroke-width="1.5"/>
    </marker>
    <marker id="agg" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="12" markerHeight="12" orient="auto">
      <polygon points="0,7 6,0 12,7 6,14" fill="white" stroke="#1E3AA0" stroke-width="1.5"/>
    </marker>
    <marker id="ass" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1E3AA0" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1200" height="56" fill="url(#hdrC)"/>
  <text x="600" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">SIARM — Class Diagram (UML)</text>

  <!-- User base class -->
  <g>
    <rect x="500" y="100" width="200" height="160" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <rect x="500" y="100" width="200" height="26" fill="#1E3AA0"/>
    <text x="600" y="118" fill="white" font-size="13" font-weight="700" text-anchor="middle">«abstract» User</text>
    <line x1="500" y1="150" x2="700" y2="150" stroke="#1E3AA0"/>
    <text x="510" y="142" fill="#1E293B" font-size="11">+ uid: String</text>
    <text x="510" y="158" fill="#1E293B" font-size="11">+ email: String</text>
    <text x="510" y="174" fill="#1E293B" font-size="11">+ name: String</text>
    <text x="510" y="190" fill="#1E293B" font-size="11">+ role: Role</text>
    <text x="510" y="206" fill="#1E293B" font-size="11">+ avatar: URL</text>
    <line x1="500" y1="216" x2="700" y2="216" stroke="#1E3AA0"/>
    <text x="510" y="232" fill="#1E3AA0" font-size="11" font-weight="700">+ signIn(): Token</text>
    <text x="510" y="248" fill="#1E3AA0" font-size="11" font-weight="700">+ signOut(): void</text>
  </g>

  <!-- Student -->
  <g>
    <rect x="60" y="320" width="220" height="170" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <rect x="60" y="320" width="220" height="26" fill="#3B6DF5"/>
    <text x="170" y="338" fill="white" font-size="13" font-weight="700" text-anchor="middle">Student</text>
    <line x1="60" y1="370" x2="280" y2="370" stroke="#1E3AA0"/>
    <text x="70" y="362" fill="#1E293B" font-size="11">+ studentId: String</text>
    <text x="70" y="378" fill="#1E293B" font-size="11">+ specialty: Specialty</text>
    <text x="70" y="394" fill="#1E293B" font-size="11">+ level: Int</text>
    <text x="70" y="410" fill="#1E293B" font-size="11">+ enrolledCourses: Course[]</text>
    <text x="70" y="426" fill="#1E293B" font-size="11">+ feeBalance: Fee</text>
    <line x1="60" y1="436" x2="280" y2="436" stroke="#1E3AA0"/>
    <text x="70" y="452" fill="#1E3AA0" font-size="11" font-weight="700">+ payTuition(method)</text>
    <text x="70" y="468" fill="#1E3AA0" font-size="11" font-weight="700">+ printIdCard(): PDF</text>
    <text x="70" y="484" fill="#1E3AA0" font-size="11" font-weight="700">+ getTranscript(): PDF</text>
  </g>

  <!-- Lecturer -->
  <g>
    <rect x="310" y="320" width="220" height="170" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <rect x="310" y="320" width="220" height="26" fill="#3B6DF5"/>
    <text x="420" y="338" fill="white" font-size="13" font-weight="700" text-anchor="middle">Lecturer</text>
    <line x1="310" y1="370" x2="530" y2="370" stroke="#1E3AA0"/>
    <text x="320" y="362" fill="#1E293B" font-size="11">+ department: String</text>
    <text x="320" y="378" fill="#1E293B" font-size="11">+ courses: Course[]</text>
    <text x="320" y="394" fill="#1E293B" font-size="11">+ officeHours: Range</text>
    <line x1="310" y1="436" x2="530" y2="436" stroke="#1E3AA0"/>
    <text x="320" y="452" fill="#1E3AA0" font-size="11" font-weight="700">+ markAttendance(class)</text>
    <text x="320" y="468" fill="#1E3AA0" font-size="11" font-weight="700">+ submitGrades(course)</text>
    <text x="320" y="484" fill="#1E3AA0" font-size="11" font-weight="700">+ getClassList()</text>
  </g>

  <!-- Staff -->
  <g>
    <rect x="560" y="320" width="220" height="170" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <rect x="560" y="320" width="220" height="26" fill="#3B6DF5"/>
    <text x="670" y="338" fill="white" font-size="13" font-weight="700" text-anchor="middle">Staff</text>
    <line x1="560" y1="370" x2="780" y2="370" stroke="#1E3AA0"/>
    <text x="570" y="362" fill="#1E293B" font-size="11">+ department: String</text>
    <text x="570" y="378" fill="#1E293B" font-size="11">+ permissions: Set</text>
    <line x1="560" y1="436" x2="780" y2="436" stroke="#1E3AA0"/>
    <text x="570" y="452" fill="#1E3AA0" font-size="11" font-weight="700">+ enrolStudent(form)</text>
    <text x="570" y="468" fill="#1E3AA0" font-size="11" font-weight="700">+ bulkEnrol(csv)</text>
    <text x="570" y="484" fill="#1E3AA0" font-size="11" font-weight="700">+ publishAnnouncement()</text>
  </g>

  <!-- Admin -->
  <g>
    <rect x="810" y="320" width="220" height="170" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <rect x="810" y="320" width="220" height="26" fill="#3B6DF5"/>
    <text x="920" y="338" fill="white" font-size="13" font-weight="700" text-anchor="middle">Admin</text>
    <line x1="810" y1="370" x2="1030" y2="370" stroke="#1E3AA0"/>
    <text x="820" y="362" fill="#1E293B" font-size="11">+ title: String</text>
    <text x="820" y="378" fill="#1E293B" font-size="11">+ permissions: Set («all»)</text>
    <line x1="810" y1="436" x2="1030" y2="436" stroke="#1E3AA0"/>
    <text x="820" y="452" fill="#1E3AA0" font-size="11" font-weight="700">+ viewAnalytics()</text>
    <text x="820" y="468" fill="#1E3AA0" font-size="11" font-weight="700">+ configureSettings()</text>
    <text x="820" y="484" fill="#1E3AA0" font-size="11" font-weight="700">+ manageUsers()</text>
  </g>

  <!-- Inheritance arrows -->
  <line x1="170" y1="320" x2="540" y2="270" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#inh)"/>
  <line x1="420" y1="320" x2="580" y2="270" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#inh)"/>
  <line x1="670" y1="320" x2="620" y2="270" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#inh)"/>
  <line x1="920" y1="320" x2="660" y2="270" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#inh)"/>

  <!-- Course -->
  <g>
    <rect x="60" y="540" width="220" height="140" fill="white" stroke="#E63946" stroke-width="2"/>
    <rect x="60" y="540" width="220" height="26" fill="#E63946"/>
    <text x="170" y="558" fill="white" font-size="13" font-weight="700" text-anchor="middle">Course</text>
    <line x1="60" y1="590" x2="280" y2="590" stroke="#E63946"/>
    <text x="70" y="582" fill="#1E293B" font-size="11">+ code: String  «CS501»</text>
    <text x="70" y="598" fill="#1E293B" font-size="11">+ name: String</text>
    <text x="70" y="614" fill="#1E293B" font-size="11">+ credits: Int</text>
    <text x="70" y="630" fill="#1E293B" font-size="11">+ lecturer: Lecturer</text>
    <text x="70" y="646" fill="#1E293B" font-size="11">+ track: Track</text>
    <line x1="60" y1="656" x2="280" y2="656" stroke="#E63946"/>
    <text x="70" y="670" fill="#E63946" font-size="11" font-weight="700">+ getSchedule(): Slot[]</text>
  </g>

  <!-- TimetableSlot -->
  <g>
    <rect x="310" y="540" width="220" height="140" fill="white" stroke="#E63946" stroke-width="2"/>
    <rect x="310" y="540" width="220" height="26" fill="#E63946"/>
    <text x="420" y="558" fill="white" font-size="13" font-weight="700" text-anchor="middle">TimetableSlot</text>
    <line x1="310" y1="590" x2="530" y2="590" stroke="#E63946"/>
    <text x="320" y="582" fill="#1E293B" font-size="11">+ day: Day</text>
    <text x="320" y="598" fill="#1E293B" font-size="11">+ time: Range</text>
    <text x="320" y="614" fill="#1E293B" font-size="11">+ room: String</text>
    <text x="320" y="630" fill="#1E293B" font-size="11">+ specialty: Specialty</text>
    <text x="320" y="646" fill="#1E293B" font-size="11">+ course: Course</text>
  </g>

  <!-- Result -->
  <g>
    <rect x="560" y="540" width="220" height="140" fill="white" stroke="#10B981" stroke-width="2"/>
    <rect x="560" y="540" width="220" height="26" fill="#10B981"/>
    <text x="670" y="558" fill="white" font-size="13" font-weight="700" text-anchor="middle">Result</text>
    <line x1="560" y1="590" x2="780" y2="590" stroke="#10B981"/>
    <text x="570" y="582" fill="#1E293B" font-size="11">+ studentId: String</text>
    <text x="570" y="598" fill="#1E293B" font-size="11">+ course: String</text>
    <text x="570" y="614" fill="#1E293B" font-size="11">+ ca: Int / 30</text>
    <text x="570" y="630" fill="#1E293B" font-size="11">+ exam: Int / 70</text>
    <text x="570" y="646" fill="#1E293B" font-size="11">+ total: Int</text>
    <line x1="560" y1="656" x2="780" y2="656" stroke="#10B981"/>
    <text x="570" y="670" fill="#10B981" font-size="11" font-weight="700">+ grade(): GradeLetter</text>
  </g>

  <!-- Payment -->
  <g>
    <rect x="810" y="540" width="220" height="140" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <rect x="810" y="540" width="220" height="26" fill="#F59E0B"/>
    <text x="920" y="558" fill="white" font-size="13" font-weight="700" text-anchor="middle">Payment</text>
    <line x1="810" y1="590" x2="1030" y2="590" stroke="#F59E0B"/>
    <text x="820" y="582" fill="#1E293B" font-size="11">+ reference: String</text>
    <text x="820" y="598" fill="#1E293B" font-size="11">+ amount: Int  «FCFA»</text>
    <text x="820" y="614" fill="#1E293B" font-size="11">+ method: PaymentMethod</text>
    <text x="820" y="630" fill="#1E293B" font-size="11">+ status: Status</text>
    <text x="820" y="646" fill="#1E293B" font-size="11">+ paidAt: DateTime</text>
    <line x1="810" y1="656" x2="1030" y2="656" stroke="#F59E0B"/>
    <text x="820" y="670" fill="#F59E0B" font-size="11" font-weight="700">+ receipt(): PDF</text>
  </g>

  <!-- Associations -->
  <line x1="170" y1="490" x2="170" y2="540" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#ass)"/>
  <text x="180" y="520" fill="#475569" font-size="10">enrolled in *</text>
  <line x1="420" y1="490" x2="420" y2="540" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#agg)"/>
  <text x="430" y="520" fill="#475569" font-size="10">teaches *</text>
  <line x1="170" y1="540" x2="280" y2="600" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="280" y1="600" x2="310" y2="600" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="170" y1="490" x2="670" y2="540" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#ass)"/>
  <text x="350" y="510" fill="#475569" font-size="10">has results *</text>
  <line x1="170" y1="490" x2="920" y2="540" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#ass)"/>
  <text x="650" y="510" fill="#475569" font-size="10">makes payments *</text>

  <!-- Legend -->
  <g>
    <rect x="1060" y="100" width="120" height="180" fill="white" stroke="#94A3B8" stroke-width="1"/>
    <text x="1120" y="120" fill="#1E293B" font-size="11" font-weight="700" text-anchor="middle">Legend</text>
    <line x1="1070" y1="140" x2="1110" y2="140" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#inh)"/>
    <text x="1115" y="143" fill="#475569" font-size="10">inherits</text>
    <line x1="1070" y1="170" x2="1110" y2="170" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#agg)"/>
    <text x="1115" y="173" fill="#475569" font-size="10">aggregates</text>
    <line x1="1070" y1="200" x2="1110" y2="200" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#ass)"/>
    <text x="1115" y="203" fill="#475569" font-size="10">associates</text>
    <line x1="1070" y1="230" x2="1110" y2="230" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="1115" y="233" fill="#475569" font-size="10">dependency</text>
  </g>

  <text x="600" y="730" fill="#64748B" font-size="11" text-anchor="middle">Inheritance (User → Student/Lecturer/Staff/Admin) · Association (uses) · Aggregation (has-a) · Dependency (dotted).</text>
</svg>
