<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdrB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3AA0"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="640" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1100" height="56" fill="url(#hdrB)"/>
  <text x="550" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">SIARM — Sprint Burndown Chart (Story Points Remaining)</text>

  <!-- Axes -->
  <line x1="120" y1="120" x2="120" y2="500" stroke="#1E293B" stroke-width="1.5"/>
  <line x1="120" y1="500" x2="1020" y2="500" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Y axis labels (story points) -->
  <text x="55" y="105" fill="#1E293B" font-size="12" font-weight="700">Story points</text>
  <text x="105" y="125" fill="#475569" font-size="11" text-anchor="end">120</text>
  <text x="105" y="190" fill="#475569" font-size="11" text-anchor="end">100</text>
  <text x="105" y="255" fill="#475569" font-size="11" text-anchor="end">80</text>
  <text x="105" y="320" fill="#475569" font-size="11" text-anchor="end">60</text>
  <text x="105" y="385" fill="#475569" font-size="11" text-anchor="end">40</text>
  <text x="105" y="450" fill="#475569" font-size="11" text-anchor="end">20</text>
  <text x="105" y="505" fill="#475569" font-size="11" text-anchor="end">0</text>

  <!-- Light gridlines -->
  <line x1="120" y1="190" x2="1020" y2="190" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="120" y1="255" x2="1020" y2="255" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="120" y1="320" x2="1020" y2="320" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="120" y1="385" x2="1020" y2="385" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="120" y1="450" x2="1020" y2="450" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- X axis labels (sprints) -->
  <text x="120" y="520" fill="#475569" font-size="11" text-anchor="middle">S0</text>
  <text x="270" y="520" fill="#475569" font-size="11" text-anchor="middle">S1</text>
  <text x="420" y="520" fill="#475569" font-size="11" text-anchor="middle">S2</text>
  <text x="570" y="520" fill="#475569" font-size="11" text-anchor="middle">S3</text>
  <text x="720" y="520" fill="#475569" font-size="11" text-anchor="middle">S4</text>
  <text x="870" y="520" fill="#475569" font-size="11" text-anchor="middle">S5</text>
  <text x="1020" y="520" fill="#475569" font-size="11" text-anchor="middle">S6</text>

  <text x="120" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">Plan</text>
  <text x="270" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">Found.</text>
  <text x="420" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">Student</text>
  <text x="570" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">Bursary</text>
  <text x="720" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">Parent</text>
  <text x="870" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">Polish</text>
  <text x="1020" y="538" fill="#94A3B8" font-size="10" text-anchor="middle">i18n</text>

  <text x="570" y="565" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">Sprints (1 week each)</text>

  <!-- Ideal line (linear from 120 to 0) -->
  <line x1="120" y1="125" x2="1020" y2="500" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="600" y="305" fill="#94A3B8" font-size="11" font-style="italic" text-anchor="middle">Ideal burndown</text>

  <!-- Actual burndown line -->
  <!-- Story points: 120 / 110 / 88 / 65 / 36 / 18 / 0 -->
  <!-- Y mapping: 0 SP = 500 ; 120 SP = 125; ratio = 375/120 = 3.125/SP -->
  <polyline points="120,125 270,156 420,225 570,297 720,388 870,444 1020,500"
            fill="none" stroke="#1E3AA0" stroke-width="3"/>

  <!-- Bumps showing added scope (S3 → S4: Parent Portal added 14 SP) -->
  <polyline points="420,225 570,206" fill="none" stroke="#E63946" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="560" y="200" fill="#E63946" font-size="10" font-style="italic">scope +14: parent portal</text>

  <polyline points="720,388 870,375" fill="none" stroke="#E63946" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="870" y="370" fill="#E63946" font-size="10" font-style="italic">scope +8: i18n + UML</text>

  <!-- Data points -->
  <g fill="#1E3AA0">
    <circle cx="120" cy="125" r="5"/>
    <circle cx="270" cy="156" r="5"/>
    <circle cx="420" cy="225" r="5"/>
    <circle cx="570" cy="297" r="5"/>
    <circle cx="720" cy="388" r="5"/>
    <circle cx="870" cy="444" r="5"/>
    <circle cx="1020" cy="500" r="5"/>
  </g>

  <!-- Value labels above points -->
  <text x="120" y="115" fill="#1E3AA0" font-size="11" font-weight="700" text-anchor="middle">120</text>
  <text x="270" y="146" fill="#1E3AA0" font-size="11" font-weight="700" text-anchor="middle">110</text>
  <text x="420" y="215" fill="#1E3AA0" font-size="11" font-weight="700" text-anchor="middle">88</text>
  <text x="570" y="287" fill="#1E3AA0" font-size="11" font-weight="700" text-anchor="middle">65</text>
  <text x="720" y="378" fill="#1E3AA0" font-size="11" font-weight="700" text-anchor="middle">36</text>
  <text x="870" y="434" fill="#1E3AA0" font-size="11" font-weight="700" text-anchor="middle">18</text>
  <text x="1020" y="490" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">0 ✓</text>

  <!-- Velocity table -->
  <g>
    <rect x="60" y="80" width="190" height="35" fill="white" stroke="#1E3AA0" stroke-width="1.5"/>
    <text x="70" y="98" fill="#1E3AA0" font-size="11" font-weight="700">Avg. velocity</text>
    <text x="70" y="110" fill="#475569" font-size="10">22 story points / sprint</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="780" y="80" width="240" height="60" fill="white" stroke="#94A3B8" stroke-width="1"/>
    <line x1="795" y1="100" x2="825" y2="100" stroke="#1E3AA0" stroke-width="3"/>
    <text x="830" y="103" fill="#475569" font-size="10">Actual burndown</text>
    <line x1="795" y1="120" x2="825" y2="120" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="830" y="123" fill="#475569" font-size="10">Ideal burndown</text>
    <line x1="930" y1="100" x2="960" y2="100" stroke="#E63946" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="965" y="103" fill="#475569" font-size="10">Scope added</text>
  </g>

  <text x="550" y="615" fill="#64748B" font-size="11" text-anchor="middle">120 starting story points, reached 0 by end of Sprint 6 · two scope-creep events captured honestly · velocity stabilised at 22 SP/sprint.</text>
</svg>
