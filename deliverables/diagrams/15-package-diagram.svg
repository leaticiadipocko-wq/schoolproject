<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdrP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3AA0"/>
      <stop offset="1" stop-color="#E63946"/>
    </linearGradient>
    <marker id="aP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E3AA0"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1200" height="56" fill="url(#hdrP)"/>
  <text x="600" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">SIARM — Package Diagram (Logical View)</text>

  <!-- Package: pages -->
  <g>
    <rect x="60" y="100" width="50" height="22" fill="#1E3AA0" stroke="#1E3AA0"/>
    <rect x="60" y="122" width="380" height="240" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <text x="85" y="116" fill="white" font-size="11" font-weight="700">«package»</text>
    <text x="250" y="146" fill="#1E3AA0" font-size="14" font-weight="700" text-anchor="middle">src/pages</text>
    <text x="80" y="180" fill="#475569" font-size="11">└ Landing.jsx</text>
    <text x="80" y="198" fill="#475569" font-size="11">└ Login.jsx · Register.jsx</text>
    <text x="80" y="216" fill="#475569" font-size="11">└ Profile.jsx · Help.jsx</text>
    <text x="80" y="240" fill="#1E3AA0" font-size="11" font-weight="700">├ student/   (9 pages)</text>
    <text x="80" y="258" fill="#1E3AA0" font-size="11" font-weight="700">├ lecturer/  (4 pages)</text>
    <text x="80" y="276" fill="#1E3AA0" font-size="11" font-weight="700">├ staff/     (2 pages)</text>
    <text x="80" y="294" fill="#1E3AA0" font-size="11" font-weight="700">├ admin/     (7 pages)</text>
    <text x="80" y="312" fill="#1E3AA0" font-size="11" font-weight="700">└ parent/    (2 pages)</text>
    <text x="80" y="340" fill="#94A3B8" font-size="10" font-style="italic">24 page modules</text>
  </g>

  <!-- Package: components -->
  <g>
    <rect x="460" y="100" width="50" height="22" fill="#1E3AA0" stroke="#1E3AA0"/>
    <rect x="460" y="122" width="320" height="240" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <text x="485" y="116" fill="white" font-size="11" font-weight="700">«package»</text>
    <text x="620" y="146" fill="#1E3AA0" font-size="14" font-weight="700" text-anchor="middle">src/components</text>
    <text x="480" y="180" fill="#475569" font-size="11">└ Logo.jsx</text>
    <text x="480" y="198" fill="#475569" font-size="11">└ QRCode.jsx</text>
    <text x="480" y="216" fill="#475569" font-size="11">└ CommandPalette.jsx</text>
    <text x="480" y="234" fill="#475569" font-size="11">└ OfflineIndicator.jsx</text>
    <text x="480" y="258" fill="#1E3AA0" font-size="11" font-weight="700">├ layout/</text>
    <text x="480" y="276" fill="#475569" font-size="11">   └ DashboardLayout</text>
    <text x="480" y="292" fill="#475569" font-size="11">   └ Sidebar  ·  Navbar</text>
    <text x="480" y="316" fill="#1E3AA0" font-size="11" font-weight="700">├ ui/  ·  auth/</text>
    <text x="480" y="332" fill="#475569" font-size="11">   └ StatCard · PageHeader</text>
    <text x="480" y="348" fill="#94A3B8" font-size="10" font-style="italic">14 reusable components</text>
  </g>

  <!-- Package: context -->
  <g>
    <rect x="800" y="100" width="50" height="22" fill="#1E3AA0" stroke="#1E3AA0"/>
    <rect x="800" y="122" width="340" height="240" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <text x="825" y="116" fill="white" font-size="11" font-weight="700">«package»</text>
    <text x="970" y="146" fill="#1E3AA0" font-size="14" font-weight="700" text-anchor="middle">src/context</text>
    <text x="820" y="180" fill="#475569" font-size="11">└ AuthContext.jsx       (login/role)</text>
    <text x="820" y="200" fill="#475569" font-size="11">└ DataContext.jsx       (mock store)</text>
    <text x="820" y="220" fill="#475569" font-size="11">└ LanguageContext.jsx   (i18n EN/FR)</text>
    <text x="820" y="260" fill="#1E3AA0" font-size="11" font-weight="700">Exposed hooks</text>
    <text x="820" y="280" fill="#475569" font-size="11">  useAuth()</text>
    <text x="820" y="296" fill="#475569" font-size="11">  useData()</text>
    <text x="820" y="312" fill="#475569" font-size="11">  useLang()</text>
    <text x="820" y="340" fill="#94A3B8" font-size="10" font-style="italic">3 global React contexts</text>
  </g>

  <!-- Package: lib -->
  <g>
    <rect x="60" y="400" width="50" height="22" fill="#1E3AA0" stroke="#1E3AA0"/>
    <rect x="60" y="422" width="380" height="220" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <text x="85" y="416" fill="white" font-size="11" font-weight="700">«package»</text>
    <text x="250" y="446" fill="#1E3AA0" font-size="14" font-weight="700" text-anchor="middle">src/lib</text>
    <text x="80" y="480" fill="#475569" font-size="11">└ mockData.js  (users, courses, timetable)</text>
    <text x="80" y="500" fill="#475569" font-size="11">└ navItems.js  (sidebar per role)</text>
    <text x="80" y="520" fill="#475569" font-size="11">└ roles.js     (RBAC constants)</text>
    <text x="80" y="540" fill="#475569" font-size="11">└ firebase.js  (Auth + Firestore init)</text>
    <text x="80" y="560" fill="#475569" font-size="11">└ icsExport.js (.ics calendar generator)</text>
    <text x="80" y="600" fill="#94A3B8" font-size="10" font-style="italic">Pure helpers, no React state</text>
  </g>

  <!-- External: Firebase -->
  <g>
    <rect x="460" y="400" width="320" height="100" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="620" y="430" fill="#92400E" font-size="13" font-weight="700" text-anchor="middle">«external» Firebase</text>
    <text x="620" y="455" fill="#475569" font-size="11" text-anchor="middle">Authentication · Cloud Firestore · Storage</text>
    <text x="620" y="475" fill="#94A3B8" font-size="10" text-anchor="middle">Optional in demo mode</text>
  </g>

  <!-- External: Payment providers -->
  <g>
    <rect x="800" y="400" width="340" height="100" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="970" y="430" fill="#92400E" font-size="13" font-weight="700" text-anchor="middle">«external» Payment providers</text>
    <text x="970" y="455" fill="#475569" font-size="11" text-anchor="middle">MTN MoMo · Orange Money · PayPal · Visa</text>
    <text x="970" y="475" fill="#94A3B8" font-size="10" text-anchor="middle">Simulated in demo · live in production</text>
  </g>

  <!-- Dependencies -->
  <line x1="250" y1="362" x2="250" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#aP)"/>
  <text x="260" y="385" fill="#475569" font-size="10">uses</text>

  <line x1="620" y1="362" x2="620" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#aP)"/>
  <text x="630" y="385" fill="#475569" font-size="10">depends on</text>

  <line x1="970" y1="362" x2="970" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#aP)"/>
  <text x="980" y="385" fill="#475569" font-size="10">connects to</text>

  <line x1="440" y1="240" x2="460" y2="240" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aP)"/>
  <line x1="780" y1="240" x2="800" y2="240" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aP)"/>

  <text x="600" y="680" fill="#64748B" font-size="11" text-anchor="middle">Four internal packages (pages · components · context · lib) + two external dependencies (Firebase, payment providers).</text>
</svg>
