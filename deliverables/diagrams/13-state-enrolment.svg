<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Calibri, Inter, sans-serif">
  <defs>
    <linearGradient id="hdrS2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3AA0"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <marker id="aS2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E3AA0"/>
    </marker>
  </defs>
  <rect width="1100" height="540" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1100" height="56" fill="url(#hdrS2)"/>
  <text x="550" y="36" fill="white" font-size="22" font-weight="700" text-anchor="middle">Enrolment State Machine — UML State Diagram</text>

  <circle cx="60" cy="280" r="10" fill="#1E293B"/>

  <g>
    <rect x="100" y="240" width="150" height="90" rx="50" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <text x="175" y="275" fill="#1E3AA0" font-size="14" font-weight="700" text-anchor="middle">Prospect</text>
    <text x="175" y="295" fill="#475569" font-size="10" text-anchor="middle">Browsing</text>
    <text x="175" y="310" fill="#475569" font-size="10" text-anchor="middle">/parent</text>
  </g>

  <g>
    <rect x="290" y="240" width="150" height="90" rx="50" fill="white" stroke="#1E3AA0" stroke-width="2"/>
    <text x="365" y="275" fill="#1E3AA0" font-size="14" font-weight="700" text-anchor="middle">In wizard</text>
    <text x="365" y="295" fill="#475569" font-size="10" text-anchor="middle">Steps 1-3</text>
    <text x="365" y="310" fill="#475569" font-size="10" text-anchor="middle">data collected</text>
  </g>

  <g>
    <rect x="480" y="240" width="150" height="90" rx="50" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="555" y="275" fill="#92400E" font-size="14" font-weight="700" text-anchor="middle">Awaiting pay</text>
    <text x="555" y="295" fill="#475569" font-size="10" text-anchor="middle">Review &amp; pay</text>
    <text x="555" y="310" fill="#475569" font-size="10" text-anchor="middle">step</text>
  </g>

  <g>
    <rect x="670" y="240" width="150" height="90" rx="50" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="745" y="275" fill="#92400E" font-size="14" font-weight="700" text-anchor="middle">Paying</text>
    <text x="745" y="295" fill="#475569" font-size="10" text-anchor="middle">Modal open</text>
    <text x="745" y="310" fill="#475569" font-size="10" text-anchor="middle">credentials in</text>
  </g>

  <g>
    <rect x="860" y="240" width="150" height="90" rx="50" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <text x="935" y="275" fill="#065F46" font-size="14" font-weight="700" text-anchor="middle">Enrolled</text>
    <text x="935" y="295" fill="#065F46" font-size="10" text-anchor="middle">Matricule active</text>
    <text x="935" y="310" fill="#065F46" font-size="10" text-anchor="middle">Receipt printed</text>
  </g>

  <g>
    <rect x="480" y="380" width="150" height="80" rx="50" fill="#FEF2F2" stroke="#E63946" stroke-width="2"/>
    <text x="555" y="412" fill="#7F1D1D" font-size="14" font-weight="700" text-anchor="middle">Abandoned</text>
    <text x="555" y="432" fill="#475569" font-size="10" text-anchor="middle">Wizard closed</text>
    <text x="555" y="446" fill="#475569" font-size="10" text-anchor="middle">no payment</text>
  </g>

  <circle cx="1050" cy="280" r="14" fill="white" stroke="#1E293B" stroke-width="2"/>
  <circle cx="1050" cy="280" r="8" fill="#1E293B"/>

  <!-- Transitions -->
  <line x1="70" y1="280" x2="100" y2="280" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aS2)"/>
  <text x="65" y="270" fill="#1E3AA0" font-size="10">open()</text>
  <line x1="250" y1="280" x2="290" y2="280" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aS2)"/>
  <text x="252" y="270" fill="#1E3AA0" font-size="10">begin()</text>
  <line x1="440" y1="280" x2="480" y2="280" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aS2)"/>
  <text x="442" y="270" fill="#1E3AA0" font-size="10">stepDone()</text>
  <line x1="630" y1="280" x2="670" y2="280" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aS2)"/>
  <text x="630" y="270" fill="#1E3AA0" font-size="10">submit()</text>
  <line x1="820" y1="280" x2="860" y2="280" stroke="#10B981" stroke-width="1.5" marker-end="url(#aS2)"/>
  <text x="820" y="270" fill="#10B981" font-size="10">paid()</text>
  <line x1="1010" y1="280" x2="1040" y2="280" stroke="#1E3AA0" stroke-width="1.5" marker-end="url(#aS2)"/>

  <!-- Abandonment paths -->
  <line x1="365" y1="330" x2="555" y2="380" stroke="#E63946" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#aS2)"/>
  <line x1="555" y1="330" x2="555" y2="380" stroke="#E63946" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#aS2)"/>
  <line x1="745" y1="330" x2="630" y2="420" stroke="#E63946" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#aS2)"/>
  <text x="370" y="380" fill="#E63946" font-size="10">close()</text>

  <!-- Recover from abandoned -->
  <line x1="480" y1="420" x2="365" y2="330" stroke="#475569" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#aS2)"/>
  <text x="380" y="380" fill="#475569" font-size="10">resume()</text>

  <text x="550" y="510" fill="#64748B" font-size="12" text-anchor="middle">States: Prospect → In-wizard → Awaiting-pay → Paying → Enrolled · Recovery: Abandoned ⇢ resume() back to In-wizard.</text>
</svg>
